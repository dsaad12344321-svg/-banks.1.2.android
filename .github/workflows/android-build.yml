name: Build Android

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Build AAB
        run: ./gradlew bundleRelease || true

      - name: Show generated files
        run: |
          echo "===== APK ====="
          find . -name "*.apk"
          echo "===== AAB ====="
          find . -name "*.aab"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: |
            **/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: AAB
          path: |
            **/*.aab